<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadence</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    <!-- LOGO HEADER -->
    <div class="logo-lockup">
      <svg class="logo-mark" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <rect x="88" y="112" width="336" height="88" rx="22" fill="#4caf50"/>
        <rect x="88" y="196" width="88" height="108" fill="#26a69a"/>
        <rect x="88" y="304" width="88" height="108" fill="#ffa726"/>
        <rect x="88" y="308" width="336" height="88" rx="22" fill="#ef5350"/>
        <rect x="88" y="192" width="88" height="16" fill="#26a69a"/>
        <rect x="88" y="304" width="88" height="16" fill="#ffa726"/>
      </svg>
      <div class="logo-text">
        <div class="logo-wordmark">Cadence</div>
        <div class="logo-tagline">tone · nuance · mastery</div>
      </div>
    </div>

    <div class="meta">
      <div id="streak">🔥 Streak: 0</div>
      <div id="difficulty"></div>
    </div>
    <div id="solvedStack"></div>
    <div id="grid" class="grid"></div>
    <div id="overlay" class="overlay hidden">
      <div id="overlayText"></div>
    </div>
    <div class="footer">
      <button id="methodBtn">About the Method</button>
    </div>
  </div>

  <!-- COMPLETION SCREEN -->
  <div id="completionScreen" class="completion-screen hidden">
    <div class="completion-box">
      <div id="completionEmoji" class="completion-emoji"></div>
      <div id="completionHeadline" class="completion-headline"></div>
      <div id="completionSub" class="completion-sub"></div>
      <div class="completion-stats">
        <span id="completionMistakes" class="completion-stat"></span>
        <span class="completion-divider">·</span>
        <span id="completionStreak" class="completion-stat"></span>
      </div>
      <button id="completionDismiss" class="completion-dismiss">Done</button>
    </div>
  </div>

  <div id="methodModal" class="modal hidden">
    <div class="modalContent">
      <h2>About the Method</h2>
      <div id="methodContent"></div>
      <button id="closeModal">Close</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
